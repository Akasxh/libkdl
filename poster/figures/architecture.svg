<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 500" width="650" height="500"
     font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Subtle drop shadow for main boxes -->
    <filter id="ds" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
    <!-- Arrow marker — dark gray -->
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <!-- Arrow marker — teal for proposed path -->
    <marker id="ah-teal" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
    <!-- Arrow marker — red for current path -->
    <marker id="ah-red" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#991b1b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="650" height="500" fill="#ffffff"/>

  <!-- ════════════════════════════════════════════════════
       BOX 1: MLIR gpu.module  (top, centered)
  ════════════════════════════════════════════════════ -->
  <g filter="url(#ds)">
    <rect x="175" y="16" width="300" height="48" rx="4" ry="4"
          fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  </g>
  <text x="325" y="36" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">MLIR gpu.module</text>
  <text x="325" y="52" text-anchor="middle" font-size="11" fill="#6b7280">(single source, multi-target)</text>

  <!-- Arrow 1: gpu.module → OffloadBinary -->
  <line x1="325" y1="64" x2="325" y2="102" stroke="#374151" stroke-width="1.5"
        marker-end="url(#ah)"/>
  <!-- Label on arrow -->
  <text x="334" y="87" font-size="9" fill="#6b7280" font-family="'Courier New', monospace">gpu-module-to-binary</text>

  <!-- ════════════════════════════════════════════════════
       BOX 2: OffloadBinary  (blue)
  ════════════════════════════════════════════════════ -->
  <g filter="url(#ds)">
    <rect x="145" y="106" width="360" height="98" rx="4" ry="4"
          fill="#dbeafe" stroke="#2d7fc1" stroke-width="1.5"/>
  </g>
  <text x="325" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">OffloadBinary</text>

  <!-- Variant chips row -->
  <!-- sm_75 CUBIN -->
  <rect x="175" y="136" width="80" height="32" rx="4" ry="4"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="215" y="150" text-anchor="middle" font-size="11" font-weight="bold"
        font-family="'Courier New', monospace" fill="#1e40af">sm_75</text>
  <text x="215" y="163" text-anchor="middle" font-size="9" fill="#3b82f6">CUBIN</text>

  <!-- gfx90a HSACO -->
  <rect x="272" y="136" width="80" height="32" rx="4" ry="4"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="312" y="150" text-anchor="middle" font-size="11" font-weight="bold"
        font-family="'Courier New', monospace" fill="#1e40af">gfx90a</text>
  <text x="312" y="163" text-anchor="middle" font-size="9" fill="#3b82f6">HSACO</text>

  <!-- x86 ELF -->
  <rect x="369" y="136" width="80" height="32" rx="4" ry="4"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="409" y="150" text-anchor="middle" font-size="11" font-weight="bold"
        font-family="'Courier New', monospace" fill="#1e40af">x86</text>
  <text x="409" y="163" text-anchor="middle" font-size="9" fill="#3b82f6">ELF</text>

  <!-- Metadata annotation -->
  <text x="325" y="192" text-anchor="middle" font-size="9" fill="#6b7280"
        font-style="italic">+ metadata: min_sm, features, variant_priority ...</text>

  <!-- Arrow 2: OffloadBinary → fork -->
  <line x1="325" y1="204" x2="325" y2="230" stroke="#374151" stroke-width="1.5"/>

  <!-- Fork: horizontal line -->
  <line x1="220" y1="230" x2="430" y2="230" stroke="#374151" stroke-width="1.5"/>

  <!-- Left branch down to "Current" -->
  <line x1="220" y1="230" x2="220" y2="252" stroke="#374151" stroke-width="1.5"
        marker-end="url(#ah)"/>
  <!-- Right branch down to "Proposed" -->
  <line x1="430" y1="230" x2="430" y2="252" stroke="#374151" stroke-width="1.5"
        marker-end="url(#ah)"/>

  <!-- ════════════════════════════════════════════════════
       BOX 3a: Current — first match (red, the BAD approach)
  ════════════════════════════════════════════════════ -->
  <g filter="url(#ds)">
    <rect x="148" y="256" width="144" height="70" rx="4" ry="4"
          fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
  </g>
  <text x="220" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f1d1d">Current:</text>
  <text x="220" y="293" text-anchor="middle" font-size="11" fill="#991b1b">first match</text>
  <text x="220" y="308" text-anchor="middle" font-size="11" fill="#991b1b">(blind)</text>

  <!-- ════════════════════════════════════════════════════
       BOX 3b: Proposed — #gpu.runtime_select (teal, highlighted)
  ════════════════════════════════════════════════════ -->
  <g filter="url(#ds)">
    <rect x="358" y="256" width="168" height="70" rx="4" ry="4"
          fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5"/>
  </g>
  <text x="442" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">Proposed:</text>
  <text x="442" y="293" text-anchor="middle" font-size="11" font-family="'Courier New', monospace"
        fill="#0d9488">#gpu.runtime_select</text>
  <text x="442" y="310" text-anchor="middle" font-size="11" fill="#115e59">(ranked by metadata)</text>

  <!-- "NEW" pill badge -->
  <rect x="510" y="248" width="38" height="18" rx="9" ry="9" fill="#0d9488"/>
  <text x="529" y="261" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">NEW</text>

  <!-- ════════════════════════════════════════════════════
       Arrows from Current and Proposed down to "Best variant"
  ════════════════════════════════════════════════════ -->
  <!-- Current: dashed down-right elbow to Best variant box -->
  <path d="M 220 326 L 220 356 L 290 356 L 290 374"
        stroke="#991b1b" stroke-width="1.2" fill="none" stroke-dasharray="4,3"
        marker-end="url(#ah-red)"/>

  <!-- Proposed: solid down-left elbow to Best variant box -->
  <path d="M 442 326 L 442 356 L 370 356 L 370 374"
        stroke="#0d9488" stroke-width="1.5" fill="none"
        marker-end="url(#ah-teal)"/>

  <!-- ════════════════════════════════════════════════════
       BOX 4: Best variant for current GPU (green)
  ════════════════════════════════════════════════════ -->
  <g filter="url(#ds)">
    <rect x="230" y="378" width="200" height="62" rx="4" ry="4"
          fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  </g>
  <text x="330" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Best variant for current GPU</text>

  <!-- Check/X marks for variant selection -->
  <text x="258" y="414" font-size="11" fill="#16a34a" font-weight="bold">&#x2713;</text>
  <text x="272" y="414" font-size="11" font-family="'Courier New', monospace" fill="#166534">sm_75 CUBIN</text>
  <text x="258" y="430" font-size="11" fill="#dc2626" font-weight="bold">&#x2717;</text>
  <text x="272" y="430" font-size="11" font-family="'Courier New', monospace" fill="#9ca3af">gfx90a</text>
  <text x="342" y="430" font-size="11" fill="#dc2626" font-weight="bold">&#x2717;</text>
  <text x="356" y="430" font-size="11" font-family="'Courier New', monospace" fill="#9ca3af">x86</text>

  <!-- ════════════════════════════════════════════════════
       Arrow: Best variant → GPU execution
  ════════════════════════════════════════════════════ -->
  <line x1="330" y1="440" x2="330" y2="458" stroke="#374151" stroke-width="1.5"
        marker-end="url(#ah)"/>

  <!-- ════════════════════════════════════════════════════
       BOX 5: GPU execution (orange)
  ════════════════════════════════════════════════════ -->
  <g filter="url(#ds)">
    <rect x="220" y="462" width="220" height="30" rx="4" ry="4"
          fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  </g>
  <text x="330" y="482" text-anchor="middle" font-size="11" font-family="'Courier New', monospace"
        fill="#9a3412">cuModuleLoadData → cuLaunchKernel → GPU</text>

</svg>