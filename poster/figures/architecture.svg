<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600"
     font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Drop shadow for main boxes -->
    <filter id="ds" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <!-- Arrow marker — dark gray -->
    <marker id="ah" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#374151"/>
    </marker>
    <!-- Arrow marker — teal for proposed path -->
    <marker id="ah-teal" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#0d9488"/>
    </marker>
    <!-- Arrow marker — red for current path -->
    <marker id="ah-red" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#991b1b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff"/>

  <!-- ================================================================
       BOX 1: MLIR gpu.module  (top, centered)
  ================================================================ -->
  <g filter="url(#ds)">
    <rect x="250" y="14" width="400" height="62" rx="6" ry="6"
          fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  </g>
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f2937">MLIR gpu.module</text>
  <text x="450" y="62" text-anchor="middle" font-size="16" fill="#6b7280">Single source → multi-target</text>

  <!-- Arrow 1: gpu.module → OffloadBinary -->
  <line x1="450" y1="76" x2="450" y2="122" stroke="#374151" stroke-width="2.5"
        marker-end="url(#ah)"/>
  <!-- Label on arrow -->
  <text x="464" y="104" font-size="14" fill="#6b7280" font-family="'Courier New', monospace">gpu-module-to-binary</text>

  <!-- ================================================================
       BOX 2: OffloadBinary  (blue)
  ================================================================ -->
  <g filter="url(#ds)">
    <rect x="155" y="128" width="590" height="128" rx="6" ry="6"
          fill="#dbeafe" stroke="#2d7fc1" stroke-width="2"/>
  </g>
  <text x="450" y="156" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e3a5f">OffloadBinary</text>

  <!-- Variant chips row -->
  <!-- sm_75 CUBIN -->
  <rect x="200" y="170" width="130" height="48" rx="6" ry="6"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="265" y="192" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="'Courier New', monospace" fill="#1e40af">sm_75</text>
  <text x="265" y="210" text-anchor="middle" font-size="13" fill="#3b82f6">CUBIN</text>

  <!-- gfx90a HSACO -->
  <rect x="355" y="170" width="130" height="48" rx="6" ry="6"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="420" y="192" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="'Courier New', monospace" fill="#1e40af">gfx90a</text>
  <text x="420" y="210" text-anchor="middle" font-size="13" fill="#3b82f6">HSACO</text>

  <!-- x86 ELF -->
  <rect x="510" y="170" width="130" height="48" rx="6" ry="6"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="575" y="192" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="'Courier New', monospace" fill="#1e40af">x86</text>
  <text x="575" y="210" text-anchor="middle" font-size="13" fill="#3b82f6">ELF</text>

  <!-- Metadata annotation -->
  <text x="450" y="244" text-anchor="middle" font-size="14" fill="#6b7280"
        font-style="italic">+ metadata: min_sm, requires_features, variant_priority</text>

  <!-- Arrow 2: OffloadBinary → fork -->
  <line x1="450" y1="256" x2="450" y2="286" stroke="#374151" stroke-width="2.5"/>

  <!-- Fork: horizontal line -->
  <line x1="270" y1="286" x2="630" y2="286" stroke="#374151" stroke-width="2.5"/>

  <!-- Left branch down to "Current" -->
  <line x1="270" y1="286" x2="270" y2="314" stroke="#374151" stroke-width="2.5"
        marker-end="url(#ah)"/>
  <!-- Right branch down to "Proposed" -->
  <line x1="630" y1="286" x2="630" y2="314" stroke="#374151" stroke-width="2.5"
        marker-end="url(#ah)"/>

  <!-- ================================================================
       BOX 3a: Current — first match (red, the BAD approach)
  ================================================================ -->
  <g filter="url(#ds)">
    <rect x="170" y="320" width="200" height="90" rx="6" ry="6"
          fill="#fecaca" stroke="#991b1b" stroke-width="2"/>
  </g>
  <text x="270" y="348" text-anchor="middle" font-size="20" font-weight="bold" fill="#7f1d1d">Current:</text>
  <text x="270" y="372" text-anchor="middle" font-size="18" fill="#991b1b">first match</text>
  <text x="270" y="396" text-anchor="middle" font-size="18" fill="#991b1b">(blind)</text>

  <!-- ================================================================
       BOX 3b: Proposed — #gpu.runtime_select (teal, highlighted)
  ================================================================ -->
  <g filter="url(#ds)">
    <rect x="510" y="320" width="240" height="90" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0d9488" stroke-width="3"/>
  </g>
  <text x="630" y="348" text-anchor="middle" font-size="20" font-weight="bold" fill="#134e4a">Proposed:</text>
  <text x="630" y="372" text-anchor="middle" font-size="16" font-family="'Courier New', monospace"
        fill="#0d9488">#gpu.runtime_select</text>
  <text x="630" y="396" text-anchor="middle" font-size="16" fill="#115e59">(ranked by metadata)</text>

  <!-- "NEW" pill badge -->
  <rect x="728" y="308" width="52" height="24" rx="12" ry="12" fill="#0d9488"/>
  <text x="754" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">NEW</text>

  <!-- ================================================================
       Arrows from Current and Proposed down to "Best variant"
  ================================================================ -->
  <!-- Current: dashed down-right elbow to Best variant box -->
  <path d="M 270 410 L 270 448 L 400 448 L 400 472"
        stroke="#991b1b" stroke-width="2" fill="none" stroke-dasharray="6,4"
        marker-end="url(#ah-red)"/>

  <!-- Proposed: solid down-left elbow to Best variant box -->
  <path d="M 630 410 L 630 448 L 510 448 L 510 472"
        stroke="#0d9488" stroke-width="2.5" fill="none"
        marker-end="url(#ah-teal)"/>

  <!-- ================================================================
       BOX 4: Best variant for current GPU (green)
  ================================================================ -->
  <g filter="url(#ds)">
    <rect x="290" y="478" width="320" height="58" rx="6" ry="6"
          fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  </g>
  <text x="450" y="500" text-anchor="middle" font-size="18" font-weight="bold" fill="#14532d">Best variant for current GPU</text>

  <!-- Check/X marks for variant selection -->
  <text x="318" y="524" font-size="18" fill="#16a34a" font-weight="bold">&#x2713;</text>
  <text x="338" y="524" font-size="16" font-family="'Courier New', monospace" fill="#166534">sm_75 CUBIN</text>
  <text x="478" y="524" font-size="18" fill="#dc2626" font-weight="bold">&#x2717;</text>
  <text x="498" y="524" font-size="16" font-family="'Courier New', monospace" fill="#9ca3af">gfx90a</text>
  <text x="568" y="524" font-size="18" fill="#dc2626" font-weight="bold">&#x2717;</text>
  <text x="588" y="524" font-size="16" font-family="'Courier New', monospace" fill="#9ca3af">x86</text>

  <!-- ================================================================
       Arrow: Best variant → GPU execution
  ================================================================ -->
  <line x1="450" y1="536" x2="450" y2="556" stroke="#374151" stroke-width="2.5"
        marker-end="url(#ah)"/>

  <!-- ================================================================
       BOX 5: GPU execution (orange)
  ================================================================ -->
  <g filter="url(#ds)">
    <rect x="245" y="562" width="410" height="32" rx="6" ry="6"
          fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  </g>
  <text x="450" y="584" text-anchor="middle" font-size="16" font-family="'Courier New', monospace"
        fill="#9a3412">cuModuleLoadData → cuLaunchKernel → GPU execution</text>

</svg>