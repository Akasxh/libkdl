<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <!-- Rejected item filter (desaturate) -->
    <filter id="desaturate">
      <feColorMatrix type="saturate" values="0.15"/>
    </filter>

    <!-- Arrow marker - main blue -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d7fc1"/>
    </marker>
    <!-- Arrow marker - teal (selected binary) -->
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
    <!-- Arrow marker - orange (cuda calls) -->
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <!-- Arrow marker - dark -->
    <marker id="arrow-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a365d"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="700" height="400" fill="#ffffff"/>

  <!-- ══════════════════════════════════════════════════════
       BOX 1: MLIR gpu.module (top left)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="28" width="200" height="60" rx="8" ry="8"
          fill="#f0f6fc" stroke="#2d7fc1" stroke-width="2"/>
  </g>
  <!-- MLIR icon stripe -->
  <rect x="30" y="28" width="6" height="60" rx="3" ry="3" fill="#2d7fc1"/>
  <text x="148" y="53" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a365d">MLIR</text>
  <text x="148" y="71" text-anchor="middle" font-size="13" font-family="'Courier New', monospace" fill="#2d7fc1">gpu.module</text>

  <!-- ══════════════════════════════════════════════════════
       ARROW 1: gpu.module → gpu-module-to-binary pass
  ══════════════════════════════════════════════════════ -->
  <!-- Arrow shaft -->
  <line x1="130" y1="88" x2="130" y2="118" stroke="#2d7fc1" stroke-width="2"
        marker-end="url(#arrow-blue)"/>
  <!-- Pass label pill -->
  <rect x="60" y="93" width="168" height="20" rx="10" ry="10"
        fill="#dbeafe" stroke="#2d7fc1" stroke-width="1"/>
  <text x="144" y="107" text-anchor="middle" font-size="10" font-family="'Courier New', monospace"
        fill="#1a365d">gpu-module-to-binary</text>

  <!-- ══════════════════════════════════════════════════════
       BOX 2: OffloadBinary (middle left)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="120" width="200" height="110" rx="8" ry="8"
          fill="#f0f6fc" stroke="#2d7fc1" stroke-width="2"/>
  </g>
  <rect x="30" y="120" width="6" height="110" rx="3" ry="3" fill="#2d7fc1"/>
  <text x="148" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a365d">OffloadBinary</text>
  <text x="148" y="160" text-anchor="middle" font-size="10" fill="#64748b">N device images</text>

  <!-- Divider inside OffloadBinary -->
  <line x1="42" y1="167" x2="224" y2="167" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Binary variant chips -->
  <!-- sm_75 CUBIN — REJECTED (grayed) -->
  <g filter="url(#desaturate)">
    <rect x="46" y="173" width="55" height="20" rx="4" ry="4"
          fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
    <text x="73" y="187" text-anchor="middle" font-size="9" font-weight="bold" fill="#0369a1">sm_75</text>
    <text x="73" y="198" text-anchor="middle" font-size="7" fill="#64748b">CUBIN</text>
  </g>
  <!-- Red X on sm_75 -->
  <text x="98" y="188" font-size="12" fill="#dc2626" font-weight="bold">✕</text>

  <!-- gfx90a HSACO — SELECTED (highlighted green) -->
  <rect x="113" y="173" width="60" height="20" rx="4" ry="4"
        fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="143" y="187" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d">gfx90a</text>
  <text x="143" y="198" text-anchor="middle" font-size="7" fill="#15803d">HSACO</text>
  <!-- Green checkmark on gfx90a -->
  <text x="171" y="188" font-size="12" fill="#16a34a" font-weight="bold">✓</text>

  <!-- x86 ELF — REJECTED (grayed) -->
  <g filter="url(#desaturate)">
    <rect x="182" y="173" width="45" height="20" rx="4" ry="4"
          fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
    <text x="204" y="187" text-anchor="middle" font-size="9" font-weight="bold" fill="#854d0e">x86</text>
    <text x="204" y="198" text-anchor="middle" font-size="7" fill="#64748b">ELF</text>
  </g>
  <!-- Red X on x86 -->
  <text x="225" y="188" font-size="12" fill="#dc2626" font-weight="bold">✕</text>

  <!-- ══════════════════════════════════════════════════════
       ARROW 2: OffloadBinary → Runtime Selection
  ══════════════════════════════════════════════════════ -->
  <line x1="130" y1="230" x2="130" y2="264" stroke="#2d7fc1" stroke-width="2"
        marker-end="url(#arrow-blue)"/>
  <!-- "select" label -->
  <text x="138" y="251" font-size="9.5" fill="#64748b" font-style="italic">evaluate candidates</text>

  <!-- ══════════════════════════════════════════════════════
       BOX 3: Runtime Selection (NEW — teal highlight)
  ══════════════════════════════════════════════════════ -->
  <!-- Glow ring behind the box -->
  <rect x="24" y="260" width="212" height="92" rx="11" ry="11"
        fill="none" stroke="#0d948866" stroke-width="4"/>
  <g filter="url(#shadow)">
    <rect x="30" y="266" width="200" height="80" rx="8" ry="8"
          fill="#f0fdfa" stroke="#0d9488" stroke-width="2.5"/>
  </g>
  <!-- Teal left stripe -->
  <rect x="30" y="266" width="6" height="80" rx="3" ry="3" fill="#0d9488"/>

  <text x="148" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">Runtime Selection</text>
  <text x="148" y="302" text-anchor="middle" font-size="9" font-family="'Courier New', monospace"
        fill="#0d9488">#gpu.runtime_select</text>

  <!-- Metadata tags row -->
  <rect x="44" y="308" width="66" height="14" rx="3" ry="3" fill="#ccfbf1" stroke="#5eead4" stroke-width="0.8"/>
  <text x="77" y="319" text-anchor="middle" font-size="8" fill="#0f766e">min_sm</text>

  <rect x="116" y="308" width="82" height="14" rx="3" ry="3" fill="#ccfbf1" stroke="#5eead4" stroke-width="0.8"/>
  <text x="157" y="319" text-anchor="middle" font-size="8" fill="#0f766e">req_features</text>

  <rect x="44" y="326" width="100" height="14" rx="3" ry="3" fill="#ccfbf1" stroke="#5eead4" stroke-width="0.8"/>
  <text x="94" y="337" text-anchor="middle" font-size="8" fill="#0f766e">variant_priority</text>

  <!-- ══════════════════════════════════════════════════════
       "NEW" badge (star)
  ══════════════════════════════════════════════════════ -->
  <circle cx="228" cy="266" r="16" fill="#0d9488" stroke="#fff" stroke-width="2"
          filter="url(#shadow)"/>
  <text x="228" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">NEW</text>

  <!-- ══════════════════════════════════════════════════════
       BOX 4: Best Binary / CUDA Launch (right column)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="430" y="190" width="230" height="100" rx="8" ry="8"
          fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  </g>
  <rect x="430" y="190" width="6" height="100" rx="3" ry="3" fill="#ea580c"/>

  <text x="553" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c2d12">GPU Kernel Launch</text>
  <line x1="442" y1="220" x2="654" y2="220" stroke="#fed7aa" stroke-width="1"/>

  <!-- cuModuleLoadData chip -->
  <rect x="444" y="228" width="140" height="20" rx="4" ry="4"
        fill="#ffedd5" stroke="#fb923c" stroke-width="1"/>
  <text x="514" y="242" text-anchor="middle" font-size="10" font-family="'Courier New', monospace"
        fill="#c2410c">cuModuleLoadData</text>

  <!-- cuLaunchKernel chip -->
  <rect x="444" y="254" width="140" height="20" rx="4" ry="4"
        fill="#ffedd5" stroke="#fb923c" stroke-width="1"/>
  <text x="514" y="268" text-anchor="middle" font-size="10" font-family="'Courier New', monospace"
        fill="#c2410c">cuLaunchKernel</text>

  <!-- GPU chip icon (simple) -->
  <rect x="596" y="228" width="46" height="46" rx="4" ry="4"
        fill="#1a365d" stroke="#2d7fc1" stroke-width="1.5"/>
  <text x="619" y="248" text-anchor="middle" font-size="9" fill="#93c5fd" font-weight="bold">GPU</text>
  <text x="619" y="263" text-anchor="middle" font-size="7" fill="#60a5fa">device</text>
  <!-- GPU grid dots -->
  <circle cx="608" cy="270" r="1.5" fill="#60a5fa"/>
  <circle cx="616" cy="270" r="1.5" fill="#60a5fa"/>
  <circle cx="624" cy="270" r="1.5" fill="#60a5fa"/>
  <circle cx="632" cy="270" r="1.5" fill="#60a5fa"/>

  <!-- ══════════════════════════════════════════════════════
       MAIN HORIZONTAL ARROW: Runtime Selection → Best Binary
       Goes right from Runtime Selection box at y=306 (midpoint of rt sel)
  ══════════════════════════════════════════════════════ -->
  <!-- Elbow arrow: Runtime Selection (right edge x=230, y=306) → (x=430, y=240) -->
  <path d="M 230 306 L 350 306 L 350 240 L 425 240"
        stroke="#0d9488" stroke-width="2.5" fill="none"
        stroke-dasharray="none"
        marker-end="url(#arrow-teal)"/>
  <text x="290" y="298" text-anchor="middle" font-size="9.5" fill="#0f766e" font-weight="bold">best match</text>

  <!-- ══════════════════════════════════════════════════════
       SIDE PANEL: "Currently" vs "Proposed" legend
  ══════════════════════════════════════════════════════ -->
  <rect x="430" y="28" width="230" height="148" rx="8" ry="8"
        fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"
        filter="url(#shadow)"/>
  <text x="545" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a365d">Selection Strategy</text>
  <line x1="440" y1="57" x2="652" y2="57" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Current approach -->
  <rect x="440" y="64" width="8" height="8" rx="2" fill="#94a3b8"/>
  <text x="455" y="73" font-size="10" fill="#475569" font-weight="bold">Current:</text>
  <text x="455" y="87" font-size="9.5" fill="#64748b">Select first compatible binary</text>
  <text x="455" y="100" font-size="9.5" fill="#64748b">— ignores performance data</text>

  <line x1="440" y1="108" x2="652" y2="108" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Proposed approach -->
  <rect x="440" y="115" width="8" height="8" rx="2" fill="#0d9488"/>
  <text x="455" y="124" font-size="10" fill="#0d9488" font-weight="bold">Proposed:</text>
  <text x="455" y="138" font-size="9.5" fill="#134e4a">#gpu.runtime_select attr</text>
  <text x="455" y="152" font-size="9.5" fill="#134e4a">— ranked by SM, features,</text>
  <text x="455" y="166" font-size="9.5" fill="#134e4a">  variant priority metadata</text>

  <!-- ══════════════════════════════════════════════════════
       TITLE at bottom
  ══════════════════════════════════════════════════════ -->
  <text x="350" y="388" text-anchor="middle" font-size="10" fill="#94a3b8"
        font-style="italic">
    LLVM/MLIR GPU Kernel Dispatch Pipeline — Runtime Binary Selection
  </text>

  <!-- ══════════════════════════════════════════════════════
       Vertical connector: OffloadBinary left side → labels
  ══════════════════════════════════════════════════════ -->
  <!-- dashed "contains" brace annotation -->
  <text x="18" y="178" font-size="9" fill="#94a3b8" transform="rotate(-90,18,178)" text-anchor="middle"
        writing-mode="vertical-rl">contains</text>

  <!-- ══════════════════════════════════════════════════════
       Step numbers / flow indicators
  ══════════════════════════════════════════════════════ -->
  <!-- Step 1 circle -->
  <circle cx="278" cy="58" r="11" fill="#2d7fc1"/>
  <text x="278" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">1</text>
  <!-- Step 2 circle -->
  <circle cx="278" cy="175" r="11" fill="#2d7fc1"/>
  <text x="278" y="179" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">2</text>
  <!-- Step 3 circle -->
  <circle cx="278" cy="306" r="11" fill="#0d9488"/>
  <text x="278" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">3</text>
  <!-- Step 4 circle -->
  <circle cx="406" cy="240" r="11" fill="#ea580c"/>
  <text x="406" y="244" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">4</text>

  <!-- Step labels -->
  <text x="293" y="54" font-size="8.5" fill="#64748b">Compilation</text>
  <text x="293" y="171" font-size="8.5" fill="#64748b">Fat binary</text>
  <text x="293" y="302" font-size="8.5" fill="#0f766e" font-weight="bold">Selection</text>
  <text x="420" y="236" font-size="8.5" fill="#c2410c">Launch</text>

</svg>
