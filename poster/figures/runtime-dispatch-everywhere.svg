<svg xmlns="http://www.w3.org/2000/svg" width="680" height="180" viewBox="0 0 680 180"
     font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="180" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="14" text-anchor="middle" font-size="10" font-weight="700"
        fill="#6b7280" letter-spacing="1.6"
        text-transform="uppercase">RUNTIME DISPATCH IS ALREADY UNIVERSAL — EXCEPT MLIR</text>

  <!-- Cards: 5 columns, each 124px wide, 6px gap -->
  <!-- x positions: 10, 140, 270, 400, 530 -->
  <!-- Card height: 90px, top: 24 -->

  <!-- Card 1: cuBLAS -->
  <rect x="10" y="24" width="124" height="90" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="10" y="24" width="3.5" height="90" rx="2" fill="#16a34a"/>
  <circle cx="120" cy="35" r="7" fill="#16a34a"/>
  <text x="118" y="38.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#x2713;</text>
  <text x="22" y="43" font-size="13" font-weight="700" fill="#1f2937">cuBLAS</text>
  <text x="22" y="60" font-size="9" fill="#6b7280">Tile heuristic selects</text>
  <text x="22" y="72" font-size="9" fill="#6b7280">from 100s of GEMM variants</text>

  <!-- Card 2: cuDNN v9 -->
  <rect x="140" y="24" width="124" height="90" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="140" y="24" width="3.5" height="90" rx="2" fill="#16a34a"/>
  <circle cx="250" cy="35" r="7" fill="#16a34a"/>
  <text x="248" y="38.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#x2713;</text>
  <text x="152" y="43" font-size="13" font-weight="700" fill="#1f2937">cuDNN v9</text>
  <text x="152" y="60" font-size="9" fill="#6b7280">NVRTC JIT compilation,</text>
  <text x="152" y="72" font-size="9" fill="#6b7280">3 heuristic modes</text>

  <!-- Card 3: PyTorch -->
  <rect x="270" y="24" width="124" height="90" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="270" y="24" width="3.5" height="90" rx="2" fill="#16a34a"/>
  <circle cx="380" cy="35" r="7" fill="#16a34a"/>
  <text x="378" y="38.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#x2713;</text>
  <text x="282" y="43" font-size="13" font-weight="700" fill="#1f2937">PyTorch</text>
  <text x="282" y="60" font-size="9" fill="#6b7280">DispatchKeySet on</text>
  <text x="282" y="72" font-size="9" fill="#6b7280">every op call</text>

  <!-- Card 4: torch.compile -->
  <rect x="400" y="24" width="124" height="90" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="400" y="24" width="3.5" height="90" rx="2" fill="#16a34a"/>
  <circle cx="510" cy="35" r="7" fill="#16a34a"/>
  <text x="508" y="38.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#x2713;</text>
  <text x="412" y="43" font-size="13" font-weight="700" fill="#1f2937">torch.compile</text>
  <text x="412" y="60" font-size="9" fill="#6b7280">Shape guards trigger</text>
  <text x="412" y="72" font-size="9" fill="#6b7280">recompile at runtime</text>

  <!-- Card 5: MLIR gpu.binary — the gap -->
  <rect x="530" y="24" width="140" height="90" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="530" y="24" width="3.5" height="90" rx="2" fill="#dc2626"/>
  <circle cx="656" cy="35" r="7" fill="#dc2626"/>
  <text x="654" y="38.5" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">&#x2717;</text>
  <text x="542" y="43" font-size="13" font-weight="700" fill="#1f2937">MLIR gpu.binary</text>
  <text x="542" y="60" font-size="9" fill="#6b7280">select_object is</text>
  <text x="542" y="72" font-size="9" fill="#991b1b" font-weight="600">compile-time only</text>

  <!-- Down arrow from MLIR box to solution pill -->
  <line x1="600" y1="114" x2="600" y2="128" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="600" y1="128" x2="340" y2="128" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="340" y1="128" x2="340" y2="141" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Solution pill -->
  <rect x="80" y="145" width="520" height="26" rx="13" fill="#0d9488"/>
  <text x="340" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">
    <tspan font-weight="400" fill="#ccfbf1">This Work: </tspan>#gpu.runtime_select fills the gap
  </text>
</svg>