<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200"
     font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="300" height="200" fill="#ffffff"/>

  <!-- Subtle teal watermark ring behind the number -->
  <circle cx="150" cy="78" r="58" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.08"/>
  <circle cx="150" cy="78" r="48" fill="none" stroke="#0d9488" stroke-width="2.5" opacity="0.06"/>
  <circle cx="150" cy="78" r="68" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.04"/>

  <!-- Hero number -->
  <text x="150" y="100" text-anchor="middle" font-size="72" font-weight="700" fill="#1a2e44">3&#x2013;6 ns</text>

  <!-- Subtitle -->
  <text x="150" y="124" text-anchor="middle" font-size="14" fill="#6b7280">selection overhead per dispatch</text>

  <!-- Secondary stat -->
  <text x="150" y="145" text-anchor="middle" font-size="11" fill="#9ca3af">&lt; 0.01% of kernel launch latency</text>

  <!-- Divider line -->
  <line x1="100" y1="158" x2="200" y2="158" stroke="#d1d5db" stroke-width="1"/>

  <!-- Context line -->
  <text x="150" y="175" text-anchor="middle" font-size="10" font-style="italic" fill="#9ca3af">Faster than a single L2 cache access</text>
</svg>